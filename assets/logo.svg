<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="interstellar logo">
  <defs>
    <radialGradient id="space" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#2b1b56"/>
      <stop offset="55%" stop-color="#150e30"/>
      <stop offset="100%" stop-color="#070512"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- space backdrop -->
  <rect width="256" height="256" rx="56" fill="url(#space)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="42" cy="54" r="1.8" opacity="0.9"/>
    <circle cx="150" cy="36" r="1.3" opacity="0.7"/>
    <circle cx="214" cy="60" r="2.0" opacity="0.85"/>
    <circle cx="226" cy="148" r="1.4" opacity="0.6"/>
    <circle cx="196" cy="212" r="1.7" opacity="0.8"/>
    <circle cx="92" cy="222" r="1.3" opacity="0.65"/>
    <circle cx="32" cy="166" r="1.9" opacity="0.85"/>
    <circle cx="28" cy="104" r="1.2" opacity="0.55"/>
  </g>

  <!-- wormhole: concentric ellipses rotating inward into a vortex -->
  <g transform="translate(128 128)" fill="none" stroke="url(#ring)" stroke-width="3" stroke-linecap="round">
    <ellipse rx="93" ry="63" opacity="0.30" transform="rotate(0)"/>
    <ellipse rx="79" ry="53" opacity="0.45" transform="rotate(16)"/>
    <ellipse rx="65" ry="43" opacity="0.60" transform="rotate(32)"/>
    <ellipse rx="51" ry="34" opacity="0.74" transform="rotate(48)"/>
    <ellipse rx="37" ry="25" opacity="0.88" transform="rotate(64)"/>
    <ellipse rx="24" ry="16" opacity="1" transform="rotate(80)"/>
  </g>

  <!-- connection nodes riding the rings -->
  <g>
    <circle cx="201" cy="118" r="4.5" fill="#22d3ee"/>
    <circle cx="69" cy="150" r="4" fill="#ec4899"/>
    <circle cx="150" cy="196" r="3.5" fill="#8b5cf6"/>
  </g>

  <!-- glowing gateway core -->
  <g transform="translate(128 128)" filter="url(#glow)">
    <circle r="22" fill="url(#core)"/>
    <circle r="6" fill="#ffffff"/>
  </g>
</svg>
