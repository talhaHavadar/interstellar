<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="interstellar">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1140"/>
      <stop offset="60%" stop-color="#120c2b"/>
      <stop offset="100%" stop-color="#080612"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="45%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="760" height="220" rx="40" fill="url(#panel)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="40" cy="44" r="1.6" opacity="0.8"/>
    <circle cx="196" cy="34" r="1.3" opacity="0.6"/>
    <circle cx="150" cy="188" r="1.5" opacity="0.7"/>
    <circle cx="44" cy="170" r="1.4" opacity="0.65"/>
    <circle cx="612" cy="40" r="1.5" opacity="0.6"/>
    <circle cx="710" cy="170" r="1.6" opacity="0.7"/>
  </g>

  <!-- portal mark -->
  <g transform="translate(118 110) scale(0.78)" fill="none" stroke="url(#ring)" stroke-width="3" stroke-linecap="round">
    <ellipse rx="93" ry="63" opacity="0.30" transform="rotate(0)"/>
    <ellipse rx="79" ry="53" opacity="0.45" transform="rotate(16)"/>
    <ellipse rx="65" ry="43" opacity="0.60" transform="rotate(32)"/>
    <ellipse rx="51" ry="34" opacity="0.74" transform="rotate(48)"/>
    <ellipse rx="37" ry="25" opacity="0.88" transform="rotate(64)"/>
    <ellipse rx="24" ry="16" opacity="1" transform="rotate(80)"/>
  </g>
  <g>
    <circle cx="175" cy="102" r="3.6" fill="#22d3ee"/>
    <circle cx="64" cy="126" r="3.2" fill="#ec4899"/>
    <circle cx="118" cy="162" r="2.8" fill="#8b5cf6"/>
  </g>
  <g transform="translate(118 110)" filter="url(#glow)">
    <circle r="17" fill="url(#core)"/>
    <circle r="5" fill="#ffffff"/>
  </g>

  <!-- wordmark -->
  <text x="244" y="128" font-family="'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="76" font-weight="600" letter-spacing="0.5" fill="url(#word)">interstellar</text>
  <text x="248" y="162" font-family="'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="500" letter-spacing="6.5" fill="#8b85b8">A I &#160; A G E N T &#160; G A T E W A Y</text>
</svg>
